<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INC-1999 — Archive</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {

    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;

    height: 100vh;
    overflow: hidden;

}


/* BARRE ARCHIVE */

.header {

    height: 50px;
    border-bottom: 1px solid #222;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 20px;

    font-size: 11px;
    letter-spacing: 2px;

    color: #666;

}


.header span {

    color: #ff3333;

}


/* ZONE PDF */

.viewer {

    width: 100%;
    height: calc(100vh - 50px);

    display: flex;
    justify-content: center;
    align-items: center;

}


/* CONTENEUR DOSSIER */

.document {

    width: 90%;
    height: 92%;

    background: #111;

    border: 1px solid #333;

    box-shadow:
    0 0 40px rgba(255,255,255,0.05);

}


/* PDF */

iframe {

    width:100%;
    height:100%;

    border:none;

}


/* MOBILE */

@media(max-width:600px){

    .header {

        padding:0 12px;
        font-size:9px;

    }


    .document {

        width:100%;
        height:100%;

        border:none;

    }


    .viewer {

        height:calc(100vh - 50px);

    }

}


</style>

</head>



<body>


<div class="header">

<div>
ARCHIVES — SERVICE GESTION DIMENSIONNELLE
</div>


<div>
<span>INC-1999</span>
</div>


</div>



<div class="viewer">


<div class="document">


<iframe src="INC-1999.pdf"></iframe>


</div>


</div>



</body>

</html>
