<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dossier Classifié</title>

<style>

body {
    margin: 0;
    background: #050505;
    color: #d8d8d8;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 50px;
}

h1 {
    color: #ff3333;
    letter-spacing: 5px;
}

.dossier {
    background: rgba(255,255,255,0.05);
    border: 1px solid #333;
    padding: 30px;
    border-radius: 10px;
}

iframe {
    width: 100%;
    height: 800px;
    border: none;
}

</style>

</head>


<body>

<div class="container">

<h1>DOSSIER CLASSIFIÉ</h1>

<div class="dossier">

<p>
Accès autorisé.
Documents récupérés.
</p>


<iframe src="ton-document.pdf"></iframe>


</div>

</div>


</body>
</html>
